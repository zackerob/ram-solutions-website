services:
  # ─── Backend — Production (tracks main) ────────────────────────────────
  - name: ram-solutions-backend
    type: web
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: free
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: https://ram-solutions-frontend.onrender.com
      - key: CONTACT_EMAIL
        value: robertsamsolutions@gmail.com
      - key: LOG_LEVEL
        value: INFO

  # ─── Backend — Staging (tracks dev) ────────────────────────────────────
  - name: ram-solutions-backend-staging
    type: web
    env: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    plan: free
    branch: dev
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: staging
      - key: SECRET_KEY
        generateValue: true
      - key: HOST
        value: 0.0.0.0
      - key: ALLOWED_ORIGINS
        value: https://ram-solutions-frontend-staging.onrender.com
      - key: CONTACT_EMAIL
        value: robertsamsolutions@gmail.com
      - key: LOG_LEVEL
        value: DEBUG

  # ─── Frontend — Production (tracks main) ───────────────────────────────
  - name: ram-solutions-frontend
    type: web
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    branch: main
    # SPA fallback so client-side routes (/services, /about, …) resolve on reload.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ram-solutions-backend.onrender.com

  # ─── Frontend — Staging (tracks dev) ───────────────────────────────────
  - name: ram-solutions-frontend-staging
    type: web
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    branch: dev
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://ram-solutions-backend-staging.onrender.com
