<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact — RAM Solutions</title>
  <meta name="description" content="Get in touch with RAM Solutions about an engineering, modeling, or additive manufacturing project.">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="index.html">
        <img src="assets/logo.svg" alt="RAM Solutions" class="brand-logo">
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
    </div>
  </header>

  <section class="hero" style="padding: 72px 0 56px;">
    <div class="wrap">
      <span class="eyebrow">Contact</span>
      <h1 style="max-width: 20ch;">Tell us about your project.</h1>
      <p class="lead">Share a bit of detail below and we'll get back to you to talk through next steps.</p>
    </div>
  </section>

  <section class="section">
    <div class="wrap contact-grid">
      <div>
        <!--
          Replace this form's action with a real endpoint before launch,
          e.g. a free form at https://formspree.io (create a form there,
          then set action="https://formspree.io/f/your-form-id").
        -->
        <form class="contact-form" action="https://formspree.io/f/your-form-id" method="POST">
          <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" required>
          </div>
          <div class="field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" required>
          </div>
          <div class="field">
            <label for="message">Project details</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <div>
            <button class="btn btn-primary" type="submit">Send message</button>
          </div>
        </form>
      </div>

      <div class="info-list">
        <div>
          <div class="label">Email</div>
          <div class="value"><a href="mailto:robertsamsolutions@gmail.com">robertsamsolutions@gmail.com</a></div>
        </div>
        <div>
          <div class="label">Response time</div>
          <div class="value">Usually within 1&ndash;2 business days</div>
        </div>
      </div>
    </div>
  </section>

  <footer class="site-footer">
    <div class="wrap">
      <a class="brand" href="index.html">
        <img src="assets/logo.svg" alt="RAM Solutions" class="brand-logo">
      </a>
      <nav>
        <a href="services.html">Services</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
    <div class="wrap">
      <p class="fine-print">&copy; 2026 RAM Solutions. All rights reserved.</p>
    </div>
  </footer>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
